<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FF8C00">
    <title>バスケットボール学習プラットフォーム</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23FF8C00' width='180' height='180'/><text x='90' y='100' font-size='60' fill='white' text-anchor='middle' font-weight='bold'>B</text></svg>">
    
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <style>
        :root {
            --primary-orange: #FF8C00;
            --accent-red: #DC143C;
            --dark-bg: #1a1a1a;
            --light-bg: #f8f8f8;
            --text-dark: #333;
            --text-light: #666;
            --border-color: #ddd;
            --success-green: #28a745;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: 'Segoe UI', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--light-bg);
            color: var(--text-dark);
            line-height: 1.6;
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* ===== ヘッダー ===== */
        header {
            background: linear-gradient(135deg, var(--primary-orange) 0%, #ff9f1c 100%);
            color: white;
            padding: 0.8rem 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .app-title-group {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .app-title {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .app-subtitle {
            font-size: 0.75rem;
            opacity: 0.9;
        }

        .header-controls {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-bar {
            position: relative;
            width: 200px;
        }

        .search-bar input {
            width: 100%;
            padding: 0.6rem 1rem;
            border: none;
            border-radius: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 0.9rem;
        }

        .search-bar input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .search-bar input:focus {
            outline: none;
            background: rgba(255,255,255,0.3);
        }

        /* ===== メインコンテナ ===== */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 0;
        }

        /* 左サイドバー：目次 */
        .sidebar-left {
            width: 280px;
            background: white;
            border-right: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 1rem;
            border-bottom: 2px solid var(--primary-orange);
            font-weight: 700;
            color: var(--primary-orange);
            font-size: 0.95rem;
        }

        .toc-container {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .toc-chapter {
            margin-bottom: 1rem;
        }

        .toc-chapter-title {
            font-weight: 700;
            color: var(--primary-orange);
            padding: 0.8rem;
            background: rgba(255, 140, 0, 0.1);
            border-radius: 4px;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toc-chapter-title:hover {
            background: rgba(255, 140, 0, 0.2);
        }

        .toc-section {
            list-style: none;
        }

        .toc-section li {
            margin: 0.3rem 0;
        }

        .toc-link {
            display: block;
            padding: 0.6rem 1rem;
            color: var(--text-dark);
            text-decoration: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .toc-link:hover {
            background: var(--light-bg);
            border-left-color: var(--primary-orange);
            padding-left: 0.85rem;
        }

        .toc-link.active {
            background: rgba(255, 140, 0, 0.1);
            color: var(--primary-orange);
            border-left-color: var(--primary-orange);
            font-weight: 600;
        }

        /* 中央：PDFビューア */
        .pdf-viewer-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            overflow: hidden;
        }

        .pdf-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem;
            border-bottom: 1px solid var(--border-color);
            background: var(--light-bg);
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .page-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .page-input {
            width: 50px;
            padding: 0.4rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            text-align: center;
            font-size: 0.9rem;
        }

        .zoom-controls {
            display: flex;
            gap: 0.4rem;
        }

        .btn-icon {
            background: white;
            border: 1px solid var(--border-color);
            color: var(--text-dark);
            width: 32px;
            height: 32px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            background: var(--primary-orange);
            color: white;
            border-color: var(--primary-orange);
        }

        .pdf-canvas-container {
            flex: 1;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #525252;
            position: relative;
        }

        #pdfCanvas {
            max-width: 100%;
            height: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            background: white;
            display: block;
        }

        .pdf-loading {
            position: absolute;
            text-align: center;
            color: white;
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 右サイドバー：学習ツール */
        .sidebar-right {
            width: 300px;
            background: white;
            border-left: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: var(--light-bg);
        }

        .sidebar-tab {
            flex: 1;
            padding: 0.8rem;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-light);
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .sidebar-tab.active {
            color: var(--primary-orange);
            border-bottom-color: var(--primary-orange);
            background: white;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
        }

        /* メモセクション */
        .memo-section {
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--primary-orange);
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .memo-form {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-bottom: 1rem;
        }

        .memo-input {
            padding: 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: inherit;
            resize: none;
            min-height: 70px;
            transition: all 0.2s;
        }

        .memo-input:focus {
            outline: none;
            border-color: var(--primary-orange);
            box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.1);
        }

        .color-picker {
            display: flex;
            gap: 0.6rem;
            justify-content: space-around;
        }

        .color-option {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.2s;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.selected {
            border-color: var(--text-dark);
            box-shadow: 0 0 0 2px white, 0 0 0 4px var(--text-dark);
        }

        .btn-save {
            padding: 0.8rem;
            background: linear-gradient(135deg, var(--primary-orange) 0%, #ff9f1c 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 140, 0, 0.3);
        }

        .memos-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .memo-item {
            padding: 0.8rem;
            border-radius: 6px;
            margin-bottom: 0.6rem;
            border-left: 4px solid;
            font-size: 0.9rem;
            word-wrap: break-word;
        }

        .memo-item.color-yellow {
            background: rgba(255, 193, 7, 0.1);
            border-left-color: #ffc107;
        }

        .memo-item.color-red {
            background: rgba(220, 20, 60, 0.1);
            border-left-color: #dc143c;
        }

        .memo-item.color-blue {
            background: rgba(23, 162, 184, 0.1);
            border-left-color: #17a2b8;
        }

        .memo-item.color-green {
            background: rgba(40, 167, 69, 0.1);
            border-left-color: #28a745;
        }

        .memo-text {
            margin-bottom: 0.4rem;
            line-height: 1.5;
        }

        .memo-meta {
            font-size: 0.8rem;
            color: var(--text-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .memo-delete {
            background: none;
            border: none;
            color: var(--accent-red);
            cursor: pointer;
            font-size: 0.8rem;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .memo-delete:hover {
            opacity: 1;
        }

        /* ブックマーク */
        .bookmark-item {
            padding: 0.8rem;
            background: var(--light-bg);
            border-radius: 6px;
            margin-bottom: 0.6rem;
            border-left: 3px solid var(--accent-red);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
        }

        .bookmark-item:hover {
            background: #f0f0f0;
            transform: translateX(4px);
        }

        .bookmark-page {
            font-weight: 700;
            color: var(--primary-orange);
            font-size: 0.9rem;
        }

        .bookmark-remove {
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 1rem;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .bookmark-remove:hover {
            opacity: 1;
            color: var(--accent-red);
        }

        /* 進捗 */
        .progress-stat {
            background: var(--light-bg);
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 0.8rem;
            border-left: 3px solid var(--primary-orange);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-orange);
            line-height: 1;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 0.4rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--light-bg);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 0.8rem;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-orange) 0%, #ff9f1c 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-light);
        }

        .empty-icon {
            font-size: 2.5rem;
            margin-bottom: 0.8rem;
            opacity: 0.5;
        }

        /* スクロールバー */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--light-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-light);
        }

        /* レスポンシブ */
        @media (max-width: 1200px) {
            .sidebar-left {
                width: 240px;
            }
            .sidebar-right {
                width: 260px;
            }
        }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }

            .sidebar-left {
                width: 100%;
                height: 30%;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }

            .pdf-viewer-section {
                height: 40%;
            }

            .sidebar-right {
                width: 100%;
                height: 30%;
                border-left: none;
                border-top: 1px solid var(--border-color);
            }

            .app-title {
                font-size: 1.1rem;
            }

            .app-subtitle {
                display: none;
            }

            .search-bar {
                width: 100%;
            }

            .header-container {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .sidebar-tab {
                padding: 0.6rem 0.4rem;
                font-size: 0.8rem;
            }

            .sidebar-content {
                padding: 0.8rem;
            }

            .page-info {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <!-- ===== ヘッダー ===== -->
    <header>
        <div class="header-container">
            <div class="app-title-group">
                <div class="app-title">🏀 バスケット学習プラットフォーム</div>
                <div class="app-subtitle">鈴木良和著書 8冊・横断学習</div>
            </div>
            <div class="header-controls">
                <div class="search-bar">
                    <input type="text" id="globalSearch" placeholder="キーワード検索...">
                </div>
            </div>
        </div>
    </header>

    <!-- ===== メインコンテナ ===== -->
    <div class="main-container">
        <!-- 左サイドバー：目次 -->
        <aside class="sidebar-left">
            <div class="sidebar-header">📑 目次</div>
            <div class="toc-container" id="tocContainer">
                <!-- 動的生成 -->
            </div>
        </aside>

        <!-- 中央：PDFビューア -->
        <div class="pdf-viewer-section">
            <div class="pdf-toolbar">
                <div class="page-info">
                    <button class="btn-icon" id="prevPageBtn" title="前ページ">‹</button>
                    <input type="number" id="pageInput" class="page-input" min="1" value="1">
                    <span id="totalPages">/ 0</span>
                    <button class="btn-icon" id="nextPageBtn" title="次ページ">›</button>
                </div>
                <div class="zoom-controls">
                    <button class="btn-icon" id="zoomOutBtn" title="縮小">−</button>
                    <button class="btn-icon" id="zoomInBtn" title="拡大">+</button>
                </div>
                <div id="currentSectionName" style="font-size: 0.9rem; color: var(--text-dark); flex: 1; text-align: center;"></div>
            </div>
            <div class="pdf-canvas-container" id="pdfContainer">
                <div class="pdf-loading">
                    <div class="spinner"></div>
                    <p>PDFを読み込み中...</p>
                </div>
                <canvas id="pdfCanvas"></canvas>
            </div>
        </div>

        <!-- 右サイドバー：学習ツール -->
        <aside class="sidebar-right">
            <div class="sidebar-tabs">
                <button class="sidebar-tab active" data-tab="memos">📝 メモ</button>
                <button class="sidebar-tab" data-tab="bookmarks">⭐ ブックマーク</button>
                <button class="sidebar-tab" data-tab="progress">📊 進捗</button>
            </div>

            <div class="sidebar-content">
                <!-- メモタブ -->
                <div class="tab-pane active" id="memos-pane">
                    <div class="memo-section">
                        <div class="section-title">新規メモ</div>
                        <div class="memo-form">
                            <textarea id="memoInput" class="memo-input" placeholder="このページのメモを入力..."></textarea>
                            <div class="color-picker">
                                <div class="color-option selected" style="background: #ffc107;" data-color="yellow" title="黄"></div>
                                <div class="color-option" style="background: #dc143c;" data-color="red" title="赤"></div>
                                <div class="color-option" style="background: #17a2b8;" data-color="blue" title="青"></div>
                                <div class="color-option" style="background: #28a745;" data-color="green" title="緑"></div>
                            </div>
                            <button class="btn-save" id="saveMemoBtn">メモを保存</button>
                        </div>
                    </div>

                    <div class="memo-section">
                        <div class="section-title">メモ一覧</div>
                        <div class="memos-list" id="memosList"></div>
                    </div>
                </div>

                <!-- ブックマークタブ -->
                <div class="tab-pane" id="bookmarks-pane">
                    <div class="memo-section">
                        <button class="btn-save" id="addBookmarkBtn" style="width: 100%;">📍 このページをブックマーク</button>
                    </div>
                    <div class="memo-section">
                        <div class="section-title">ブックマーク済みページ</div>
                        <div id="bookmarksList"></div>
                    </div>
                </div>

                <!-- 進捗タブ -->
                <div class="tab-pane" id="progress-pane">
                    <div class="memo-section">
                        <div class="progress-stat">
                            <div class="stat-value" id="currentPage">0</div>
                            <div class="stat-label">現在のページ</div>
                        </div>

                        <div class="progress-stat">
                            <div class="stat-value" id="progressPercent">0%</div>
                            <div class="stat-label">読了進度</div>
                            <div class="progress-bar">
                                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                            </div>
                        </div>

                        <div class="progress-stat">
                            <div class="stat-value" id="memoCount">0</div>
                            <div class="stat-label">メモ数</div>
                        </div>

                        <div class="progress-stat">
                            <div class="stat-value" id="bookmarkCount">0</div>
                            <div class="stat-label">ブックマーク数</div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- Service Worker登録 -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js').catch(err => {
                console.log('Service Worker registration failed:', err);
            });
        }
    </script>

    <!-- ===== アプリケーション ===== -->
    <script>
        // PDF.js設定
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // グローバルアプリケーションオブジェクト
        const APP = {
            pdfDoc: null,
            bookStructure: null,
            currentPage: 1,
            totalPages: 0,
            scale: 1.5,
            userData: {
                memos: {},
                bookmarks: [],
                readPages: []
            },
            ui: {
                selectedColor: 'yellow',
                currentTab: 'memos',
                currentSectionId: null
            }
        };

        // ===== ストレージ管理 =====
        class StorageManager {
            static STORAGE_KEY = 'basketball_learning_data';

            static load() {
                const data = localStorage.getItem(this.STORAGE_KEY);
                return data ? JSON.parse(data) : { memos: {}, bookmarks: [], readPages: [] };
            }

            static save(data) {
                localStorage.setItem(this.STORAGE_KEY, JSON.stringify(data));
            }

            static addMemo(page, sectionId, text, color) {
                const pageKey = String(page);
                if (!APP.userData.memos[pageKey]) {
                    APP.userData.memos[pageKey] = [];
                }
                APP.userData.memos[pageKey].push({
                    sectionId,
                    text,
                    color,
                    timestamp: new Date().toLocaleString('ja-JP')
                });
                this.save(APP.userData);
            }

            static deleteMemo(page, index) {
                const pageKey = String(page);
                if (APP.userData.memos[pageKey]) {
                    APP.userData.memos[pageKey].splice(index, 1);
                    this.save(APP.userData);
                }
            }

            static toggleBookmark(page, sectionId) {
                const index = APP.userData.bookmarks.findIndex(b => b.page === page);
                if (index > -1) {
                    APP.userData.bookmarks.splice(index, 1);
                    return false;
                } else {
                    APP.userData.bookmarks.push({ page, sectionId });
                    return true;
                }
            }

            static markPageAsRead(page) {
                if (!APP.userData.readPages.includes(page)) {
                    APP.userData.readPages.push(page);
                }
                this.save(APP.userData);
            }
        }

        // ===== 目次を読み込む =====
        async function loadBookStructure() {
            try {
                const response = await fetch('book_structure.json');
                APP.bookStructure = await response.json();
                renderTableOfContents();
            } catch (error) {
                console.error('目次読み込みエラー:', error);
            }
        }

        // ===== 目次をレンダリング =====
        function renderTableOfContents() {
            if (!APP.bookStructure) return;

            const tocContainer = document.getElementById('tocContainer');
            tocContainer.innerHTML = '';

            APP.bookStructure.chapters.forEach(chapter => {
                const chapterDiv = document.createElement('div');
                chapterDiv.className = 'toc-chapter';

                const chapterTitle = document.createElement('div');
                chapterTitle.className = 'toc-chapter-title';
                chapterTitle.textContent = `第${chapter.number}章 ${chapter.title}`;
                chapterTitle.onclick = () => goToPage(chapter.start_page, chapter.id);

                const sectionList = document.createElement('ul');
                sectionList.className = 'toc-section';

                chapter.sections.forEach(section => {
                    const li = document.createElement('li');
                    const link = document.createElement('a');
                    link.className = 'toc-link';
                    link.textContent = section.title;
                    link.onclick = (e) => {
                        e.stopPropagation();
                        goToPage(section.page, section.id);
                    };
                    li.appendChild(link);
                    sectionList.appendChild(li);
                });

                chapterDiv.appendChild(chapterTitle);
                chapterDiv.appendChild(sectionList);
                tocContainer.appendChild(chapterDiv);
            });
        }

        // ===== PDF読み込み =====
        async function loadPDF() {
            try {
                const pdfPath = 'basketball_book1.pdf';
                APP.pdfDoc = await pdfjsLib.getDocument(pdfPath).promise;
                APP.totalPages = APP.pdfDoc.numPages;
                document.getElementById('totalPages').textContent = `/ ${APP.totalPages}`;
                await renderPage(1);
            } catch (error) {
                console.error('PDF読み込みエラー:', error);
                alert('PDFの読み込みに失敗しました。');
            }
        }

        // ===== ページを描画 =====
        async function renderPage(pageNum) {
            if (!APP.pdfDoc || pageNum < 1 || pageNum > APP.totalPages) return;

            try {
                const page = await APP.pdfDoc.getPage(pageNum);
                const canvas = document.getElementById('pdfCanvas');
                const ctx = canvas.getContext('2d');

                const viewport = page.getViewport({ scale: APP.scale });
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                await page.render({
                    canvasContext: ctx,
                    viewport: viewport
                }).promise;

                APP.currentPage = pageNum;
                document.getElementById('pageInput').value = pageNum;
                document.getElementById('currentPage').textContent = pageNum;

                const progress = Math.round((pageNum / APP.totalPages) * 100);
                document.getElementById('progressPercent').textContent = `${progress}%`;
                document.getElementById('progressFill').style.width = `${progress}%`;

                // セクション情報を更新
                updateCurrentSection(pageNum);
                StorageManager.markPageAsRead(pageNum);
                updateMemoList();
                updateBookmarkList();
                updateCounts();
            } catch (error) {
                console.error('ページ描画エラー:', error);
            }
        }

        // ===== 現在のセクション情報を更新 =====
        function updateCurrentSection(pageNum) {
            if (!APP.bookStructure) return;

            for (const chapter of APP.bookStructure.chapters) {
                for (const section of chapter.sections) {
                    if (section.page === pageNum) {
                        APP.ui.currentSectionId = section.id;
                        document.getElementById('currentSectionName').textContent = 
                            `${chapter.number}-${section.number} ${section.title}`;
                        return;
                    }
                }
            }
            APP.ui.currentSectionId = null;
            document.getElementById('currentSectionName').textContent = '';
        }

        // ===== ページナビゲーション =====
        function goToPage(pageNum, sectionId = null) {
            const num = parseInt(pageNum);
            if (num >= 1 && num <= APP.totalPages) {
                renderPage(num);
                if (sectionId) APP.ui.currentSectionId = sectionId;
            }
        }

        function nextPage() {
            goToPage(APP.currentPage + 1);
        }

        function prevPage() {
            goToPage(APP.currentPage - 1);
        }

        function zoomIn() {
            APP.scale = Math.min(APP.scale + 0.25, 3);
            renderPage(APP.currentPage);
        }

        function zoomOut() {
            APP.scale = Math.max(APP.scale - 0.25, 0.5);
            renderPage(APP.currentPage);
        }

        // ===== メモ機能 =====
        function saveMemo() {
            const text = document.getElementById('memoInput').value.trim();
            if (!text) {
                alert('メモを入力してください');
                return;
            }

            StorageManager.addMemo(APP.currentPage, APP.ui.currentSectionId, text, APP.ui.selectedColor);
            document.getElementById('memoInput').value = '';
            updateMemoList();
            updateCounts();
        }

        function deleteMemo(index) {
            if (confirm('このメモを削除しますか？')) {
                StorageManager.deleteMemo(APP.currentPage, index);
                updateMemoList();
                updateCounts();
            }
        }

        function updateMemoList() {
            const memosList = document.getElementById('memosList');
            const pageKey = String(APP.currentPage);
            const memos = APP.userData.memos[pageKey] || [];

            memosList.innerHTML = '';

            if (memos.length === 0) {
                memosList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📝</div>
                        <div style="font-size: 0.9rem;">このページのメモはまだありません</div>
                    </div>
                `;
                return;
            }

            memos.forEach((memo, index) => {
                const memoDiv = document.createElement('div');
                memoDiv.className = `memo-item color-${memo.color}`;
                memoDiv.innerHTML = `
                    <div class="memo-text">${escapeHtml(memo.text)}</div>
                    <div class="memo-meta">
                        <span>p.${APP.currentPage}</span>
                        <button class="memo-delete" onclick="deleteMemo(${index})">削除</button>
                    </div>
                    <div style="font-size: 0.75rem; color: var(--text-light); margin-top: 0.4rem;">${memo.timestamp}</div>
                `;
                memosList.appendChild(memoDiv);
            });
        }

        // ===== ブックマーク機能 =====
        function toggleBookmark() {
            const isBookmarked = StorageManager.toggleBookmark(APP.currentPage, APP.ui.currentSectionId);
            const btn = document.getElementById('addBookmarkBtn');

            if (isBookmarked) {
                btn.textContent = '✓ ブックマーク済み';
                btn.style.background = 'linear-gradient(135deg, var(--success-green) 0%, #20c997 100%)';
            } else {
                btn.textContent = '📍 このページをブックマーク';
                btn.style.background = 'linear-gradient(135deg, var(--primary-orange) 0%, #ff9f1c 100%)';
            }

            StorageManager.save(APP.userData);
            updateBookmarkList();
            updateCounts();
        }

        function updateBookmarkList() {
            const bookmarksList = document.getElementById('bookmarksList');
            const bookmarks = APP.userData.bookmarks.sort((a, b) => a.page - b.page);

            const btn = document.getElementById('addBookmarkBtn');
            if (bookmarks.some(b => b.page === APP.currentPage)) {
                btn.textContent = '✓ ブックマーク済み';
                btn.style.background = 'linear-gradient(135deg, var(--success-green) 0%, #20c997 100%)';
            } else {
                btn.textContent = '📍 このページをブックマーク';
                btn.style.background = 'linear-gradient(135deg, var(--primary-orange) 0%, #ff9f1c 100%)';
            }

            bookmarksList.innerHTML = '';

            if (bookmarks.length === 0) {
                bookmarksList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⭐</div>
                        <div style="font-size: 0.9rem;">ブックマークはまだありません</div>
                    </div>
                `;
                return;
            }

            bookmarks.forEach(bookmark => {
                const item = document.createElement('div');
                item.className = 'bookmark-item';
                item.innerHTML = `
                    <span class="bookmark-page">p.${bookmark.page}</span>
                    <span style="flex: 1; font-size: 0.85rem; color: var(--text-light);">ページ ${bookmark.page}</span>
                    <button class="bookmark-remove" onclick="removeBookmark(${bookmark.page})">✕</button>
                `;
                item.addEventListener('click', () => goToPage(bookmark.page));
                bookmarksList.appendChild(item);
            });
        }

        function removeBookmark(pageNum) {
            event.stopPropagation();
            StorageManager.toggleBookmark(pageNum);
            StorageManager.save(APP.userData);
            updateBookmarkList();
            updateCounts();
        }

        // ===== カウント更新 =====
        function updateCounts() {
            const memoCount = Object.values(APP.userData.memos).reduce((sum, arr) => sum + arr.length, 0);
            const bookmarkCount = APP.userData.bookmarks.length;

            document.getElementById('memoCount').textContent = memoCount;
            document.getElementById('bookmarkCount').textContent = bookmarkCount;
        }

        // ===== ユーティリティ =====
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== イベントリスナー =====
        document.addEventListener('DOMContentLoaded', () => {
            APP.userData = StorageManager.load();
            loadBookStructure();
            loadPDF();

            // ナビゲーション
            document.getElementById('prevPageBtn').addEventListener('click', prevPage);
            document.getElementById('nextPageBtn').addEventListener('click', nextPage);
            document.getElementById('pageInput').addEventListener('change', (e) => {
                goToPage(e.target.value);
            });

            // ズーム
            document.getElementById('zoomInBtn').addEventListener('click', zoomIn);
            document.getElementById('zoomOutBtn').addEventListener('click', zoomOut);

            // メモ
            document.getElementById('saveMemoBtn').addEventListener('click', saveMemo);

            // 色選択
            document.querySelectorAll('.color-option').forEach(option => {
                option.addEventListener('click', function() {
                    document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
                    this.classList.add('selected');
                    APP.ui.selectedColor = this.dataset.color;
                });
            });

            // ブックマーク
            document.getElementById('addBookmarkBtn').addEventListener('click', toggleBookmark);

            // サイドバータブ
            document.querySelectorAll('.sidebar-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    const tabName = this.dataset.tab;
                    document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
                    this.classList.add('active');
                    document.getElementById(`${tabName}-pane`).classList.add('active');
                    APP.ui.currentTab = tabName;
                });
            });

            // キーボードショートカット
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') nextPage();
                if (e.key === 'ArrowLeft') prevPage();
                if (e.key === '+' || e.key === '=') zoomIn();
                if (e.key === '-') zoomOut();
            });

            document.getElementById('memoInput').addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'Enter') {
                    saveMemo();
                }
            });

            updateCounts();
        });
    </script>
</body>
</html>
