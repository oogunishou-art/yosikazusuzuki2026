<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FF8C00">
    <title>バスケットボール指導理論学習 - PDF統合版</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23FF8C00' width='180' height='180'/><text x='90' y='100' font-size='60' fill='white' text-anchor='middle' font-weight='bold'>B</text></svg>">
    
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <style>
        :root {
            --primary-orange: #FF8C00;
            --accent-red: #DC143C;
            --dark-bg: #1a1a1a;
            --light-bg: #f8f8f8;
            --text-dark: #333;
            --text-light: #666;
            --border-color: #ddd;
            --success-green: #28a745;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: 'Segoe UI', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--light-bg);
            color: var(--text-dark);
            line-height: 1.6;
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* ===== ヘッダー ===== */
        header {
            background: linear-gradient(135deg, var(--primary-orange) 0%, #ff9f1c 100%);
            color: white;
            padding: 0.8rem 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .app-title-group {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .app-title {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .app-subtitle {
            font-size: 0.75rem;
            opacity: 0.9;
            font-weight: 300;
        }

        .header-controls {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .page-controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            background: rgba(255,255,255,0.2);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
        }

        .page-controls input {
            width: 50px;
            padding: 0.4rem;
            border: none;
            border-radius: 4px;
            text-align: center;
            font-size: 0.9rem;
        }

        .page-controls span {
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .btn-icon {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .btn-icon:hover {
            background: rgba(255,255,255,0.3);
        }

        .btn-icon:active {
            transform: scale(0.95);
        }

        /* ===== メインレイアウト ===== */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 0;
        }

        /* PDFビューアエリア */
        .pdf-viewer-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            overflow: hidden;
        }

        .pdf-canvas-container {
            flex: 1;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #525252;
            position: relative;
        }

        #pdfCanvas {
            max-width: 100%;
            height: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            background: white;
        }

        .pdf-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== サイドバー（学習ツール） ===== */
        .sidebar {
            width: 320px;
            background: white;
            border-left: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: var(--light-bg);
        }

        .sidebar-tab {
            flex: 1;
            padding: 0.8rem;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-light);
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .sidebar-tab.active {
            color: var(--primary-orange);
            border-bottom-color: var(--primary-orange);
            background: white;
        }

        .sidebar-tab:hover {
            color: var(--text-dark);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .tab-pane {
            display: none;
            height: 100%;
        }

        .tab-pane.active {
            display: block;
        }

        /* ===== メモパネル ===== */
        .memo-section {
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--primary-orange);
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .memo-form {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-bottom: 1rem;
        }

        .memo-input {
            padding: 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: inherit;
            resize: none;
            min-height: 70px;
            transition: all 0.2s;
        }

        .memo-input:focus {
            outline: none;
            border-color: var(--primary-orange);
            box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.1);
        }

        .color-picker {
            display: flex;
            gap: 0.6rem;
            justify-content: space-around;
        }

        .color-option {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.selected {
            border-color: var(--text-dark);
            box-shadow: 0 0 0 2px white, 0 0 0 4px var(--text-dark);
        }

        .btn-save {
            padding: 0.8rem;
            background: linear-gradient(135deg, var(--primary-orange) 0%, #ff9f1c 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 140, 0, 0.3);
        }

        .btn-save:active {
            transform: translateY(0);
        }

        /* ===== メモリスト ===== */
        .memos-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .memo-item {
            padding: 0.8rem;
            border-radius: 6px;
            margin-bottom: 0.6rem;
            border-left: 4px solid;
            position: relative;
            font-size: 0.9rem;
            word-wrap: break-word;
        }

        .memo-item.color-yellow {
            background: rgba(255, 193, 7, 0.1);
            border-left-color: #ffc107;
        }

        .memo-item.color-red {
            background: rgba(220, 20, 60, 0.1);
            border-left-color: #dc143c;
        }

        .memo-item.color-blue {
            background: rgba(23, 162, 184, 0.1);
            border-left-color: #17a2b8;
        }

        .memo-item.color-green {
            background: rgba(40, 167, 69, 0.1);
            border-left-color: #28a745;
        }

        .memo-text {
            margin-bottom: 0.4rem;
            line-height: 1.5;
        }

        .memo-meta {
            font-size: 0.8rem;
            color: var(--text-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .memo-page {
            font-weight: 600;
        }

        .memo-delete {
            background: none;
            border: none;
            color: var(--accent-red);
            cursor: pointer;
            font-size: 0.8rem;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .memo-delete:hover {
            opacity: 1;
        }

        /* ===== ブックマークリスト ===== */
        .bookmarks-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .bookmark-item {
            padding: 0.8rem;
            background: var(--light-bg);
            border-radius: 6px;
            margin-bottom: 0.6rem;
            border-left: 3px solid var(--accent-red);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
        }

        .bookmark-item:hover {
            background: #f0f0f0;
            transform: translateX(4px);
        }

        .bookmark-page {
            font-weight: 700;
            color: var(--primary-orange);
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .bookmark-note {
            flex: 1;
            font-size: 0.85rem;
            color: var(--text-light);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .bookmark-remove {
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 1rem;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .bookmark-remove:hover {
            opacity: 1;
            color: var(--accent-red);
        }

        /* ===== 進捗パネル ===== */
        .progress-section {
            margin-bottom: 1.5rem;
        }

        .progress-stat {
            background: var(--light-bg);
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 0.8rem;
            border-left: 3px solid var(--primary-orange);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-orange);
            line-height: 1;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 0.4rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--light-bg);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 0.8rem;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-orange) 0%, #ff9f1c 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* ===== 空状態 ===== */
        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-light);
        }

        .empty-icon {
            font-size: 2.5rem;
            margin-bottom: 0.8rem;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 0.9rem;
            line-height: 1.6;
        }

        /* ===== レスポンシブ ===== */
        @media (max-width: 1024px) {
            .sidebar {
                width: 280px;
            }

            .app-subtitle {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 40%;
                border-left: none;
                border-top: 1px solid var(--border-color);
            }

            .pdf-viewer-section {
                height: 60%;
            }

            .header-container {
                flex-direction: column;
                align-items: stretch;
            }

            .page-controls {
                justify-content: center;
            }

            .app-title {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 480px) {
            .sidebar-tabs {
                font-size: 0.8rem;
            }

            .sidebar-tab {
                padding: 0.6rem 0.4rem;
            }

            .sidebar-content {
                padding: 0.8rem;
            }

            .page-controls {
                padding: 0.3rem 0.6rem;
                gap: 0.3rem;
            }

            .page-controls input {
                width: 40px;
                padding: 0.3rem;
            }

            .page-controls span {
                font-size: 0.8rem;
            }
        }

        /* スクロールバーのスタイリング */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--light-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-light);
        }
    </style>
</head>
<body>
    <!-- ===== ヘッダー ===== -->
    <header>
        <div class="header-container">
            <div class="app-title-group">
                <div class="app-title">🏀 バスケ学習プラットフォーム</div>
                <div class="app-subtitle">PDF.js統合版 - Book 1</div>
            </div>
            <div class="header-controls">
                <div class="page-controls">
                    <button class="btn-icon" id="prevPageBtn" title="前のページ">‹</button>
                    <input type="number" id="pageInput" min="1" value="1">
                    <span id="totalPages">/ 0</span>
                    <button class="btn-icon" id="nextPageBtn" title="次のページ">›</button>
                </div>
                <button class="btn-icon" id="zoomOutBtn" title="縮小">−</button>
                <button class="btn-icon" id="zoomInBtn" title="拡大">+</button>
                <button class="btn-icon" id="toggleFullscreenBtn" title="全画面">⛶</button>
            </div>
        </div>
    </header>

    <!-- ===== メインコンテナ ===== -->
    <div class="main-container">
        <!-- PDFビューア -->
        <div class="pdf-viewer-section">
            <div class="pdf-canvas-container" id="pdfContainer">
                <div class="pdf-loading">
                    <div class="spinner"></div>
                    <p>PDFを読み込み中...</p>
                </div>
                <canvas id="pdfCanvas"></canvas>
            </div>
        </div>

        <!-- サイドバー -->
        <aside class="sidebar">
            <div class="sidebar-tabs">
                <button class="sidebar-tab active" data-tab="memos">📝 メモ</button>
                <button class="sidebar-tab" data-tab="bookmarks">⭐ ブックマーク</button>
                <button class="sidebar-tab" data-tab="progress">📊 進捗</button>
            </div>

            <div class="sidebar-content">
                <!-- メモタブ -->
                <div class="tab-pane active" id="memos-pane">
                    <div class="memo-section">
                        <div class="section-title">新規メモ</div>
                        <div class="memo-form">
                            <textarea id="memoInput" class="memo-input" placeholder="このページのメモを入力..."></textarea>
                            <div class="color-picker" id="colorPicker">
                                <div class="color-option selected" style="background: #ffc107;" data-color="yellow" title="黄"></div>
                                <div class="color-option" style="background: #dc143c;" data-color="red" title="赤"></div>
                                <div class="color-option" style="background: #17a2b8;" data-color="blue" title="青"></div>
                                <div class="color-option" style="background: #28a745;" data-color="green" title="緑"></div>
                            </div>
                            <button class="btn-save" id="saveMemoBtn">メモを保存</button>
                        </div>
                    </div>

                    <div class="memo-section">
                        <div class="section-title">メモ一覧</div>
                        <div class="memos-list" id="memosList"></div>
                    </div>
                </div>

                <!-- ブックマークタブ -->
                <div class="tab-pane" id="bookmarks-pane">
                    <div class="memo-section">
                        <button class="btn-save" id="addBookmarkBtn" style="width: 100%;">📍 このページをブックマーク</button>
                    </div>
                    <div class="memo-section">
                        <div class="section-title">ブックマーク済みページ</div>
                        <div class="bookmarks-list" id="bookmarksList"></div>
                    </div>
                </div>

                <!-- 進捗タブ -->
                <div class="tab-pane" id="progress-pane">
                    <div class="progress-section">
                        <div class="progress-stat">
                            <div class="stat-value" id="currentPage">0</div>
                            <div class="stat-label">現在のページ</div>
                        </div>

                        <div class="progress-stat">
                            <div class="stat-value" id="totalPagesStat">0</div>
                            <div class="stat-label">総ページ数</div>
                        </div>

                        <div class="progress-stat">
                            <div class="stat-value" id="progressPercent">0%</div>
                            <div class="stat-label">読了進度</div>
                            <div class="progress-bar">
                                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                            </div>
                        </div>

                        <div class="progress-stat">
                            <div class="stat-value" id="memoCount">0</div>
                            <div class="stat-label">メモ総数</div>
                        </div>

                        <div class="progress-stat">
                            <div class="stat-value" id="bookmarkCount">0</div>
                            <div class="stat-label">ブックマーク数</div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- Service Worker登録 -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js').catch(err => {
                console.log('Service Worker registration failed:', err);
            });
        }
    </script>

    <!-- ===== メインアプリケーション ===== -->
    <script>
        // PDF.js設定
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // グローバルアプリケーションオブジェクト
        const APP = {
            pdfDoc: null,
            currentPage: 1,
            totalPages: 0,
            scale: 1.5,
            userData: {
                memos: {},      // { pageNum: [{ text, color, timestamp }] }
                bookmarks: [],  // [pageNum, ...]
                readPages: []   // [pageNum, ...]
            },
            ui: {
                selectedColor: 'yellow',
                currentTab: 'memos'
            }
        };

        // ===== ストレージ管理 =====
        class StorageManager {
            static STORAGE_KEY = 'basketball_pdf_data';

            static load() {
                const data = localStorage.getItem(this.STORAGE_KEY);
                return data ? JSON.parse(data) : { memos: {}, bookmarks: [], readPages: [] };
            }

            static save(data) {
                localStorage.setItem(this.STORAGE_KEY, JSON.stringify(data));
            }

            static addMemo(page, text, color) {
                const pageKey = String(page);
                if (!APP.userData.memos[pageKey]) {
                    APP.userData.memos[pageKey] = [];
                }
                APP.userData.memos[pageKey].push({
                    text,
                    color,
                    timestamp: new Date().toLocaleString('ja-JP')
                });
                this.save(APP.userData);
            }

            static deleteMemo(page, index) {
                const pageKey = String(page);
                if (APP.userData.memos[pageKey]) {
                    APP.userData.memos[pageKey].splice(index, 1);
                    this.save(APP.userData);
                }
            }

            static toggleBookmark(page) {
                const index = APP.userData.bookmarks.indexOf(page);
                if (index > -1) {
                    APP.userData.bookmarks.splice(index, 1);
                    return false;
                } else {
                    APP.userData.bookmarks.push(page);
                    return true;
                }
            }

            static markPageAsRead(page) {
                if (!APP.userData.readPages.includes(page)) {
                    APP.userData.readPages.push(page);
                }
                this.save(APP.userData);
            }
        }

        // ===== PDF読み込みと表示 =====
        async function loadPDF() {
            try {
                const pdfPath = 'basketball_book1.pdf';
                APP.pdfDoc = await pdfjsLib.getDocument(pdfPath).promise;
                APP.totalPages = APP.pdfDoc.numPages;

                // UIを更新
                document.getElementById('totalPages').textContent = `/ ${APP.totalPages}`;
                document.getElementById('totalPagesStat').textContent = APP.totalPages;

                // 最初のページを表示
                await renderPage(1);
            } catch (error) {
                console.error('PDF読み込みエラー:', error);
                alert('PDFの読み込みに失敗しました。ファイルが正しく配置されているか確認してください。');
            }
        }

        async function renderPage(pageNum) {
            if (!APP.pdfDoc || pageNum < 1 || pageNum > APP.totalPages) {
                return;
            }

            try {
                const page = await APP.pdfDoc.getPage(pageNum);
                const canvas = document.getElementById('pdfCanvas');
                const ctx = canvas.getContext('2d');

                const viewport = page.getViewport({ scale: APP.scale });
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                await page.render({
                    canvasContext: ctx,
                    viewport: viewport
                }).promise;

                // UIを更新
                APP.currentPage = pageNum;
                document.getElementById('pageInput').value = pageNum;
                document.getElementById('currentPage').textContent = pageNum;

                // 進捗を更新
                const progress = Math.round((pageNum / APP.totalPages) * 100);
                document.getElementById('progressPercent').textContent = `${progress}%`;
                document.getElementById('progressFill').style.width = `${progress}%`;

                // このページを読んだと記録
                StorageManager.markPageAsRead(pageNum);

                // メモとブックマークを更新
                updateMemoList();
                updateBookmarkList();
                updateCounts();
            } catch (error) {
                console.error('ページ描画エラー:', error);
            }
        }

        // ===== ページナビゲーション =====
        function goToPage(pageNum) {
            const num = parseInt(pageNum);
            if (num >= 1 && num <= APP.totalPages) {
                renderPage(num);
            }
        }

        function nextPage() {
            goToPage(APP.currentPage + 1);
        }

        function prevPage() {
            goToPage(APP.currentPage - 1);
        }

        function zoomIn() {
            APP.scale = Math.min(APP.scale + 0.25, 3);
            renderPage(APP.currentPage);
        }

        function zoomOut() {
            APP.scale = Math.max(APP.scale - 0.25, 0.5);
            renderPage(APP.currentPage);
        }

        // ===== メモ機能 =====
        function saveMemo() {
            const text = document.getElementById('memoInput').value.trim();
            if (!text) {
                alert('メモを入力してください');
                return;
            }

            StorageManager.addMemo(APP.currentPage, text, APP.ui.selectedColor);
            document.getElementById('memoInput').value = '';
            updateMemoList();
            updateCounts();
        }

        function deleteMemo(index) {
            if (confirm('このメモを削除しますか？')) {
                StorageManager.deleteMemo(APP.currentPage, index);
                updateMemoList();
                updateCounts();
            }
        }

        function updateMemoList() {
            const memosList = document.getElementById('memosList');
            const pageKey = String(APP.currentPage);
            const memos = APP.userData.memos[pageKey] || [];

            memosList.innerHTML = '';

            if (memos.length === 0) {
                memosList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📝</div>
                        <div class="empty-text">このページのメモはまだありません</div>
                    </div>
                `;
                return;
            }

            memos.forEach((memo, index) => {
                const memoDiv = document.createElement('div');
                memoDiv.className = `memo-item color-${memo.color}`;
                memoDiv.innerHTML = `
                    <div class="memo-text">${escapeHtml(memo.text)}</div>
                    <div class="memo-meta">
                        <span class="memo-page">p.${APP.currentPage}</span>
                        <button class="memo-delete" onclick="deleteMemo(${index})">削除</button>
                    </div>
                    <div style="font-size: 0.75rem; color: var(--text-light); margin-top: 0.4rem;">${memo.timestamp}</div>
                `;
                memosList.appendChild(memoDiv);
            });
        }

        // ===== ブックマーク機能 =====
        function toggleBookmark() {
            const isBookmarked = StorageManager.toggleBookmark(APP.currentPage);
            const btn = document.getElementById('addBookmarkBtn');

            if (isBookmarked) {
                btn.textContent = '✓ ブックマーク済み';
                btn.style.background = 'linear-gradient(135deg, var(--success-green) 0%, #20c997 100%)';
            } else {
                btn.textContent = '📍 このページをブックマーク';
                btn.style.background = 'linear-gradient(135deg, var(--primary-orange) 0%, #ff9f1c 100%)';
            }

            StorageManager.save(APP.userData);
            updateBookmarkList();
            updateCounts();
        }

        function updateBookmarkList() {
            const bookmarksList = document.getElementById('bookmarksList');
            const bookmarks = APP.userData.bookmarks.sort((a, b) => a - b);

            // ブックマークボタンの状態を更新
            const btn = document.getElementById('addBookmarkBtn');
            if (bookmarks.includes(APP.currentPage)) {
                btn.textContent = '✓ ブックマーク済み';
                btn.style.background = 'linear-gradient(135deg, var(--success-green) 0%, #20c997 100%)';
            } else {
                btn.textContent = '📍 このページをブックマーク';
                btn.style.background = 'linear-gradient(135deg, var(--primary-orange) 0%, #ff9f1c 100%)';
            }

            bookmarksList.innerHTML = '';

            if (bookmarks.length === 0) {
                bookmarksList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⭐</div>
                        <div class="empty-text">ブックマークはまだありません</div>
                    </div>
                `;
                return;
            }

            bookmarks.forEach(pageNum => {
                const item = document.createElement('div');
                item.className = 'bookmark-item';
                item.innerHTML = `
                    <span class="bookmark-page">p.${pageNum}</span>
                    <span class="bookmark-note">ページ ${pageNum}</span>
                    <button class="bookmark-remove" onclick="removeBookmark(${pageNum})">✕</button>
                `;
                item.style.cursor = 'pointer';
                item.addEventListener('click', () => goToPage(pageNum));
                bookmarksList.appendChild(item);
            });
        }

        function removeBookmark(pageNum) {
            event.stopPropagation();
            StorageManager.toggleBookmark(pageNum);
            StorageManager.save(APP.userData);
            updateBookmarkList();
            updateCounts();
        }

        // ===== カウント更新 =====
        function updateCounts() {
            const pageKey = String(APP.currentPage);
            const memoCount = Object.values(APP.userData.memos).reduce((sum, arr) => sum + arr.length, 0);
            const bookmarkCount = APP.userData.bookmarks.length;

            document.getElementById('memoCount').textContent = memoCount;
            document.getElementById('bookmarkCount').textContent = bookmarkCount;
        }

        // ===== ユーティリティ =====
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== イベントリスナー =====
        document.addEventListener('DOMContentLoaded', () => {
            // ストレージから読み込み
            APP.userData = StorageManager.load();

            // PDFを読み込み
            loadPDF();

            // ナビゲーションボタン
            document.getElementById('prevPageBtn').addEventListener('click', prevPage);
            document.getElementById('nextPageBtn').addEventListener('click', nextPage);
            document.getElementById('pageInput').addEventListener('change', (e) => {
                goToPage(e.target.value);
            });

            // ズーム
            document.getElementById('zoomInBtn').addEventListener('click', zoomIn);
            document.getElementById('zoomOutBtn').addEventListener('click', zoomOut);

            // メモ
            document.getElementById('saveMemoBtn').addEventListener('click', saveMemo);

            // 色選択
            document.querySelectorAll('.color-option').forEach(option => {
                option.addEventListener('click', function() {
                    document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
                    this.classList.add('selected');
                    APP.ui.selectedColor = this.dataset.color;
                });
            });

            // ブックマーク
            document.getElementById('addBookmarkBtn').addEventListener('click', toggleBookmark);

            // サイドバータブ
            document.querySelectorAll('.sidebar-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    const tabName = this.dataset.tab;
                    document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
                    this.classList.add('active');
                    document.getElementById(`${tabName}-pane`).classList.add('active');
                    APP.ui.currentTab = tabName;
                });
            });

            // キーボードショートカット
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') nextPage();
                if (e.key === 'ArrowLeft') prevPage();
                if (e.key === '+' || e.key === '=') zoomIn();
                if (e.key === '-') zoomOut();
            });

            // メモ入力のエンター処理
            document.getElementById('memoInput').addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'Enter') {
                    saveMemo();
                }
            });

            updateCounts();
        });

        // フルスクリーン
        document.getElementById('toggleFullscreenBtn').addEventListener('click', () => {
            const elem = document.documentElement;
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(err => console.log('フルスクリーン要求エラー:', err));
            } else {
                document.exitFullscreen();
            }
        });
    </script>
</body>
</html>
